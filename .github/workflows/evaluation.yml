name: US Futures Evaluation

on:
  schedule:
    - cron: "15 22 * * 1-5"
  workflow_dispatch:
  
permissions:
  contents: write

jobs:
  run-evaluation:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python run_evaluation.py

      - name: Commit DB (persist memory)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          git add memory/daily_log.db config/signal_weights.json || true
          git commit -m "Update memory + weights (evaluation)" || echo "No changes to commit"
          git push
